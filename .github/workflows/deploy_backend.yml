name: Deploy Backend (Bolayetu)

on:
  push:
    branches:
      - by-ndeas-back

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: 🚀 Deploy Backend on VPS
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /var/www/bolayetu
            ./deploy-back.sh
          EOF
